<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" width="400" height="260">
<defs>
  <style>
    .ship-body { animation: sail 7s ease-in-out infinite alternate; }
    @keyframes sail {
      0%   { transform: translate(0px, 0px) rotate(-1.2deg); }
      33%  { transform: translate(6px, -5px) rotate(0.5deg); }
      66%  { transform: translate(12px, -2px) rotate(1.2deg); }
      100% { transform: translate(18px, 0px) rotate(-0.8deg); }
    }
    .wave-front { animation: waveFront 2.8s ease-in-out infinite; }
    @keyframes waveFront {
      0%,100% { d: path("M0,205 C50,194 100,216 150,204 C200,192 250,214 300,202 C340,192 380,208 400,200 L400,260 L0,260 Z"); }
      50%      { d: path("M0,205 C50,216 100,194 150,206 C200,218 250,196 300,208 C340,218 380,202 400,210 L400,260 L0,260 Z"); }
    }
    .wave-mid { animation: waveMid 3.5s ease-in-out infinite; }
    @keyframes waveMid {
      0%,100% { d: path("M0,216 C70,205 140,225 210,213 C280,201 350,222 400,212 L400,260 L0,260 Z"); }
      50%      { d: path("M0,216 C70,227 140,207 210,219 C280,231 350,210 400,220 L400,260 L0,260 Z"); }
    }
    .wave-back { animation: waveBack 4.2s ease-in-out infinite; }
    @keyframes waveBack {
      0%,100% { d: path("M0,228 C80,218 160,236 240,224 C320,212 380,230 400,222 L400,260 L0,260 Z"); }
      50%      { d: path("M0,228 C80,238 160,220 240,232 C320,244 380,226 400,234 L400,260 L0,260 Z"); }
    }
    .flag-wave { animation: flagAnim 1.4s ease-in-out infinite alternate; transform-origin: 192px 62px; }
    @keyframes flagAnim {
      0%   { transform: skewX(0deg) scaleX(1); }
      100% { transform: skewX(-18deg) scaleX(0.9); }
    }
    .moon-glow { animation: moonPulse 4s ease-in-out infinite alternate; }
    @keyframes moonPulse {
      0%   { filter: drop-shadow(0 0 5px #ADE8F4); }
      100% { filter: drop-shadow(0 0 14px #90E0EF); }
    }
    .shimmer1 { animation: shimmer 3s ease-in-out infinite; }
    .shimmer2 { animation: shimmer 3s ease-in-out infinite 1s; }
    @keyframes shimmer {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.5; }
    }
    .star-tw { animation: twinkle 3s infinite alternate; }
    .star-tw:nth-child(odd) { animation-delay: 0.7s; }
    @keyframes twinkle { from { opacity: 0.1; } to { opacity: 0.95; } }
    .foam-a { animation: foam 2.8s ease-in-out infinite; }
    .foam-b { animation: foam 2.8s ease-in-out infinite 0.5s; }
    @keyframes foam {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
  </style>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#02032A"/>
    <stop offset="100%" stop-color="#0A4A8A"/>
  </linearGradient>
  <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0880B8"/>
    <stop offset="100%" stop-color="#03045E"/>
  </linearGradient>
  <linearGradient id="wG1" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#48CAE4" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#0077B6" stop-opacity="0.7"/>
  </linearGradient>
  <linearGradient id="wG2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#00B4D8" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#023E8A" stop-opacity="0.6"/>
  </linearGradient>
  <linearGradient id="wG3" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0096C7" stop-opacity="0.65"/>
    <stop offset="100%" stop-color="#03045E" stop-opacity="0.8"/>
  </linearGradient>
  <linearGradient id="hullG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6B4423"/>
    <stop offset="100%" stop-color="#3D2008"/>
  </linearGradient>
  <linearGradient id="sailG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#FFFFFF"/>
    <stop offset="100%" stop-color="#BDD9F0"/>
  </linearGradient>
  <radialGradient id="moonRG" cx="40%" cy="35%" r="60%">
    <stop offset="0%" stop-color="#FAFFF0"/>
    <stop offset="100%" stop-color="#CAF0F8"/>
  </radialGradient>
</defs>
